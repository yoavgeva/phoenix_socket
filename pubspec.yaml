name: dark_phoenix_socket
description: >-
  A lightweight Phoenix Channel V2 client for Dart and Flutter. Supports
  automatic reconnection, push buffering, heartbeat, and Phoenix Presence.
version: 0.1.0
repository: https://github.com/yoavgeva/dark_phoenix_socket

environment:
  sdk: ^3.11.0

topics:
  - phoenix
  - websocket
  - channels
  - realtime
  - flutter

dependencies:
  meta: ^1.9.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  fake_async: ^1.3.1
  stream_channel: ^2.1.2
  test: ^1.25.0
  very_good_analysis: ^10.2.0
